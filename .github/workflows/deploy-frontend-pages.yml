name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (with retry)
        run: |
          npm ci --no-audit --no-fund || npm ci --no-audit --no-fund

      - name: Build
        env:
          VITE_BASE_PATH: /tax_management/
          VITE_API_BASE_URL: ${{ secrets.RENDER_BACKEND_URL }}/api/v1
        run: npx vite build

      - name: Ensure Pages Site
        if: ${{ env.PAGES_DEPLOY_TOKEN != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.PAGES_DEPLOY_TOKEN != '' && env.PAGES_DEPLOY_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info('Pages site already exists.');
            } catch (error) {
              if (error.status === 404) {
                core.info('Pages site not found. Creating with build_type=workflow.');
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: 'workflow',
                });
              } else {
                throw error;
              }
            }

            await github.rest.repos.updateInformationAboutPagesSite({
              owner,
              repo,
              build_type: 'workflow',
            });
            core.info('Pages site is configured to build with GitHub Actions.');

      - name: Setup Pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
          token: ${{ env.PAGES_DEPLOY_TOKEN != '' && env.PAGES_DEPLOY_TOKEN || github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
