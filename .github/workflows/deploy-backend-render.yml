name: Deploy Backend to Render

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend-render.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK is not set"
            exit 1
          fi

          # Retry for transient network/platform errors.
          curl --retry 5 --retry-delay 3 --retry-all-errors --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered"
